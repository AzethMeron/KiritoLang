name: release

# Build shippable 64-bit `ki` binaries for Windows and Linux, each an optimized Release build with
# TLS (HTTPS) enabled and OpenSSL + the C/C++ runtime linked statically, then attach them to a
# GitHub Release. Triggered by pushing a version tag (e.g. v1.0.0); also runnable manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- Linux x86_64 (gcc; static OpenSSL/libstdc++/libgcc, glibc dynamic) ----
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + OpenSSL
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
      - name: Build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DKIRITO_ENABLE_TLS=ON -DOPENSSL_USE_STATIC_LIBS=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-s"
          cmake --build build --target ki
          mv build/ki ki-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: ki-linux-x64
          path: ki-linux-x64

  # ---- Windows x86_64 (MSVC; static CRT via /MT, static OpenSSL from vcpkg) ----
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install static OpenSSL (vcpkg)
        shell: bash
        run: vcpkg install openssl:x64-windows-static
      - name: Build
        shell: bash
        run: |
          cmake -S . -B build -A x64 \
            -DKIRITO_ENABLE_TLS=ON -DOPENSSL_USE_STATIC_LIBS=ON \
            -DVCPKG_TARGET_TRIPLET=x64-windows-static \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release --target ki
          mv build/Release/ki.exe ki-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ki-windows-x64
          path: ki-windows-x64.exe

  # ---- collect the artifacts and publish the GitHub Release ----
  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
